<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Notre Famille 🏡</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg3:#1a1a2e;--bg2:#16213e;--purple:#a78bfa;--pink:#f472b6;--green:#34d399;
    --blue:#60a5fa;--yellow:#fbbf24;--card:rgba(255,255,255,0.06);--border:rgba(255,255,255,0.1);
    --text:#f0f0f0;--muted:rgba(255,255,255,0.4);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Nunito',sans-serif;background:linear-gradient(160deg,var(--bg3) 0%,var(--bg2) 50%,#0f3460 100%);min-height:100vh;color:var(--text);max-width:430px;margin:0 auto;overflow-x:hidden;}
  .blob1,.blob2{position:fixed;border-radius:50%;pointer-events:none;z-index:0;}
  .blob1{top:-80px;right:-80px;width:250px;height:250px;background:radial-gradient(circle,rgba(167,139,250,0.15) 0%,transparent 70%);}
  .blob2{bottom:80px;left:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(52,211,153,0.1) 0%,transparent 70%);}
  #header{background:rgba(255,255,255,0.04);backdrop-filter:blur(20px);padding:16px 20px 10px;text-align:center;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;}
  #header h1{font-size:24px;font-weight:900;letter-spacing:-0.5px;text-shadow:0 0 30px rgba(167,139,250,0.8);}
  #header .sub{font-size:10px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-top:2px;}
  .sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-left:6px;vertical-align:middle;animation:pulse 2s infinite;}
  .sync-dot.offline{background:#ef4444;animation:none;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
  #content{padding:14px 12px 100px;min-height:calc(100vh - 130px);position:relative;z-index:1;}
  #tabs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(12,12,25,0.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding:6px 0 14px;z-index:100;}
  .tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 0;cursor:pointer;color:var(--muted);font-size:9px;font-weight:600;letter-spacing:0.3px;font-family:'Nunito',sans-serif;background:none;border:none;transition:color 0.2s;}
  .tab-btn.active{color:var(--purple);font-weight:800;}
  .tab-btn .icon{font-size:20px;transition:transform 0.2s,filter 0.2s;}
  .tab-btn.active .icon{filter:drop-shadow(0 0 8px var(--purple));transform:scale(1.15);}
  /* GAME */
  #game-canvas{display:block;border-radius:16px;border:2px solid rgba(167,139,250,0.3);touch-action:none;}
  .game-wrap{background:rgba(0,0,0,0.4);border-radius:18px;padding:10px;margin-bottom:12px;}
  .leaderboard-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:14px;margin-bottom:6px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);}
  .leaderboard-row.gold{background:rgba(251,191,36,0.12);border-color:rgba(251,191,36,0.3);}
  .leaderboard-row.silver{background:rgba(192,192,192,0.1);border-color:rgba(192,192,192,0.25);}
  .leaderboard-row.bronze{background:rgba(180,100,40,0.12);border-color:rgba(180,100,40,0.3);}
  .podium-medal{font-size:22px;min-width:28px;text-align:center;}
  .lb-name{font-weight:800;font-size:14px;flex:1;}
  .lb-score{font-weight:900;font-size:16px;color:#a78bfa;}
  .card{background:var(--card);border-radius:18px;border:1px solid var(--border);padding:14px;margin-bottom:12px;backdrop-filter:blur(10px);}
  .card-label{font-size:11px;color:var(--muted);font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
  .section-title{font-size:18px;font-weight:900;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
  .btn{font-family:'Nunito',sans-serif;cursor:pointer;border:none;font-weight:700;transition:opacity 0.15s;}
  .btn:active{opacity:0.7;}
  .btn-primary{background:var(--purple);color:#fff;border-radius:12px;padding:9px 16px;font-size:13px;display:inline-flex;align-items:center;gap:6px;}
  .btn-primary.full{width:100%;justify-content:center;}
  .btn-ghost{background:rgba(255,255,255,0.08);color:#fff;border:1px solid var(--border);border-radius:12px;padding:8px 14px;font-size:12px;font-family:'Nunito',sans-serif;cursor:pointer;}
  .btn-danger{background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:6px 12px;font-size:12px;font-family:'Nunito',sans-serif;cursor:pointer;}
  .btn-small{background:rgba(255,255,255,0.08);border:none;border-radius:8px;color:#fff;padding:4px 9px;font-size:12px;font-family:'Nunito',sans-serif;cursor:pointer;}
  input[type=text],input[type=date]{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:9px 12px;color:#fff;font-family:'Nunito',sans-serif;font-size:13px;width:100%;outline:none;color-scheme:dark;}
  input::placeholder{color:rgba(255,255,255,0.25);}
  label.lbl{font-size:11px;color:var(--muted);font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;display:block;}
  .form-group{margin-bottom:10px;}
  .chip{border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;display:inline-block;}
  .avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden;}
  .avatar img{width:100%;height:100%;object-fit:cover;}
  .emoji-grid{display:flex;flex-wrap:wrap;gap:7px;max-height:130px;overflow-y:auto;margin-top:8px;}
  .emoji-item{font-size:24px;cursor:pointer;padding:2px;border-radius:6px;}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .media-thumb{position:relative;border-radius:12px;overflow:hidden;aspect-ratio:1;background:rgba(255,255,255,0.05);}
  .media-thumb img,.media-thumb video{width:100%;height:100%;object-fit:cover;}
  .del-media{position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.6);border:none;border-radius:50%;width:24px;height:24px;color:#fff;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;}
  .media-author{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.7));padding:4px 6px 5px;font-size:9px;color:rgba(255,255,255,0.8);font-weight:700;}
  .type-btn{background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:10px;padding:6px 12px;font-size:12px;font-family:'Nunito',sans-serif;color:#fff;cursor:pointer;font-weight:600;}
  .color-dots{display:flex;gap:8px;flex-wrap:wrap;}
  .color-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all 0.15s;}
  .color-dot.selected{border-color:#fff;transform:scale(1.15);}
  .rank-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  .rank-num{color:var(--purple);font-weight:700;font-size:12px;min-width:18px;}
  .rank-display{display:flex;gap:6px;margin-bottom:5px;align-items:flex-start;}
  .rank-display .rn{color:var(--purple);font-weight:700;font-size:11px;min-width:18px;margin-top:1px;}
  .back-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
  .back-bar h2{font-size:17px;font-weight:900;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .fact-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .fact-label{font-size:12px;color:var(--muted);}
  .fact-val{font-size:13px;font-weight:700;max-width:55%;text-align:right;}
  .date-card{padding:12px 14px;border-radius:16px;border:1px solid var(--border);background:var(--card);margin-bottom:10px;}
  .members-strip{display:flex;gap:12px;flex-wrap:wrap;}
  .member-mini{display:flex;flex-direction:column;align-items:center;gap:4px;}
  .member-mini span{font-size:10px;color:var(--muted);font-weight:700;}
  .photos-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;}
  .photo-thumb{flex-shrink:0;border-radius:12px;overflow:hidden;width:90px;height:90px;}
  .photo-thumb img{width:100%;height:100%;object-fit:cover;}
  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:4px;}
  .hidden{display:none!important;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  .fade-in{animation:fadeUp 0.25s ease forwards;}
  .loading-overlay{position:fixed;inset:0;background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px;}
  .spinner{width:36px;height:36px;border:3px solid rgba(167,139,250,0.2);border-top-color:var(--purple);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .upload-bar{background:rgba(255,255,255,0.08);border-radius:20px;height:6px;margin-top:8px;overflow:hidden;}
  .upload-bar-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--pink));border-radius:20px;transition:width 0.3s;}
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(30,30,50,0.97);border:1px solid var(--border);border-radius:12px;padding:10px 18px;font-size:13px;font-weight:700;z-index:300;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity 0.3s;}
  .toast.show{opacity:1;}
  input[type=file]{display:none;}
  .member-row{display:flex;align-items:center;gap:12px;cursor:pointer;}

  /* Setup guide */
  .setup-box{background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.3);border-radius:16px;padding:16px;margin-bottom:14px;}
  .setup-box h3{color:#fbbf24;font-size:14px;margin-bottom:8px;}
  .setup-box code{background:rgba(0,0,0,0.3);border-radius:6px;padding:2px 6px;font-size:11px;color:#a78bfa;display:block;margin:4px 0;word-break:break-all;}
  .setup-box p{font-size:12px;color:var(--muted);margin-bottom:6px;line-height:1.5;}
</style>
</head>
<body>
<div class="blob1"></div><div class="blob2"></div>

<div class="loading-overlay" id="loading">
  <div style="font-size:60px">🏡</div>
  <div class="spinner"></div>
  <p style="color:var(--purple);font-weight:700;font-size:15px">Connexion en cours...</p>
</div>

<div id="header">
  <h1>🏡 Notre Famille <span class="sync-dot" id="sync-dot"></span></h1>
  <div class="sub" id="header-sub">Accueil</div>
</div>
<div id="content"></div>
<div id="tabs">
  <button class="tab-btn active" onclick="switchTab('accueil')" id="tab-accueil"><span class="icon">🏡</span>Accueil</button>
  <button class="tab-btn" onclick="switchTab('sondages')" id="tab-sondages"><span class="icon">📊</span>Sondages</button>
  <button class="tab-btn" onclick="switchTab('info')" id="tab-info"><span class="icon">👥</span>Infos</button>
  <button class="tab-btn" onclick="switchTab('dates')" id="tab-dates"><span class="icon">📅</span>Dates</button>
  <button class="tab-btn" onclick="switchTab('jeux')" id="tab-jeux"><span class="icon">🎮</span>Jeux</button>
</div>
<div class="toast" id="toast"></div>
<input type="file" id="file-photo" accept="image/*" onchange="handlePhotoUpload(event)">

<script>
const SUPABASE_URL='https://weougttzgwrjsloffavw.supabase.co';
const SUPABASE_KEY='sb_publishable_M1pl2Bu4sZlsjKUSasavxA_WJRbLDwn';
const CLOUDINARY_CLOUD='dk7nu3ual';
const CLOUDINARY_PRESET='famille_upload';
const {createClient}=supabase;
const db=createClient(SUPABASE_URL,SUPABASE_KEY);

const COLORS=["#f472b6","#34d399","#60a5fa","#fbbf24","#a78bfa","#f97316","#06b6d4","#84cc16"];
const EMOJIS=["👦","👧","🧒","👨","👩","🧔","👴","👵","🧑","🙋","🧑‍🦱","🧑‍🦳","🧑‍🦲","🧑‍🦰","👶","🥸","😎","🤓","🧙","🦸","🦹","🤵","👸","🤶","🎅","🧝","🧛","🧟","🐱","🐶","🦊","🐸","🐨","🐼","🦁","🐯","🐻","🦄"];
const DATE_TYPES=[
  {key:"anniversaire",label:"Anniversaire",emoji:"🎂",color:"#fbbf24"},
  {key:"evenement",label:"Événement",emoji:"🏠",color:"#34d399"},
  {key:"vacances",label:"Vacances",emoji:"🌴",color:"#60a5fa"},
  {key:"autre",label:"Autre",emoji:"📌",color:"#a78bfa"},
];

let members=[],dates=[],polls=[],scores=[];
let currentTab='accueil',currentView=null,editDraft=null;
let dbReady=false;

function toast(msg,dur=2500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);}

async function loadAll(){
  try{
    const[m,d,p,s]=await Promise.all([
      db.from('members').select('*').order('created_at'),
      db.from('dates').select('*').order('date'),
      db.from('polls').select('*').order('created_at'),
      db.from('scores').select('*').order('score',{ascending:true}).limit(50),
    ]);
    if(m.error&&m.error.code==='42P01') return false;
    if(m.error||d.error||p.error) throw m.error||d.error||p.error;
    members=m.data||[];
    dates=d.data||[];
    const pollIds=(p.data||[]).map(x=>x.id);
    let answers=[];
    if(pollIds.length){const ar=await db.from('poll_answers').select('*').in('poll_id',pollIds);answers=ar.data||[];}
    polls=(p.data||[]).map(poll=>({...poll,answers:answers.filter(a=>a.poll_id===poll.id)}));
    scores=s.data||[];
    document.getElementById('sync-dot').classList.remove('offline');
    return true;
  }catch(e){
    console.error(e);
    document.getElementById('sync-dot').classList.add('offline');
    return false;
  }
}

async function reloadPolls(){
  const p=await db.from('polls').select('*').order('created_at');
  const pollIds=(p.data||[]).map(x=>x.id);
  let answers=[];
  if(pollIds.length){const ar=await db.from('poll_answers').select('*').in('poll_id',pollIds);answers=ar.data||[];}
  polls=(p.data||[]).map(poll=>({...poll,answers:answers.filter(a=>a.poll_id===poll.id)}));
}

function setupRealtime(){
  db.channel('famille-rt')
    .on('postgres_changes',{event:'*',schema:'public',table:'members'},async()=>{
      const r=await db.from('members').select('*').order('created_at');members=r.data||[];
      if(currentTab==='accueil'||currentTab==='info')render();toast('👤 Mis à jour !');
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'dates'},async()=>{
      const r=await db.from('dates').select('*').order('date');dates=r.data||[];
      if(currentTab==='accueil'||currentTab==='dates')render();toast('📅 Mis à jour !');
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'polls'},async()=>{
      await reloadPolls();if(currentTab==='accueil'||currentTab==='sondages')render();toast('📊 Sondage mis à jour !');
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'poll_answers'},async()=>{
      await reloadPolls();if(currentTab==='sondages')render();toast('🗳️ Nouveau vote !');
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'scores'},async()=>{
      const r=await db.from('scores').select('*').order('score',{ascending:true}).limit(50);
      scores=r.data||[];
      if(currentTab==='jeux')refreshLeaderboard();
    })
    .subscribe();
}



function switchTab(tab){
  currentTab=tab;currentView=null;
  stopMaze();
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('header-sub').textContent={accueil:'Accueil',sondages:'Sondages',info:'Infos',dates:'Dates',jeux:'Jeux 🎮'}[tab];
  render();
}

function render(){
  const c=document.getElementById('content');c.innerHTML='';
  const div=document.createElement('div');div.className='fade-in';
  if(!dbReady){div.innerHTML=renderSetupGuide();}
  else if(currentTab==='accueil')div.innerHTML=renderAccueil();
  else if(currentTab==='sondages')div.innerHTML=renderSondages();
  else if(currentTab==='info')div.innerHTML=renderInfo();
  else if(currentTab==='dates')div.innerHTML=renderDates();
  else if(currentTab==='jeux'){div.innerHTML=renderJeux();initGame();}
  c.appendChild(div);
}

function renderSetupGuide(){
  return `
  <div style="text-align:center;padding:20px 0 16px"><div style="font-size:48px">⚙️</div>
    <div style="font-size:20px;font-weight:900;margin-top:8px">Configuration requise</div>
    <div style="font-size:13px;color:var(--muted);margin-top:4px">Créer les tables dans Supabase</div>
  </div>
  <div class="setup-box">
    <h3>📋 Étape 1 — Ouvre Supabase</h3>
    <p>Va sur <b>supabase.com</b> → ton projet → <b>SQL Editor</b> → colle et exécute ce code :</p>
  </div>
  <div class="card" style="background:rgba(0,0,0,0.3)">
    <div style="font-size:11px;color:var(--purple);font-weight:800;margin-bottom:8px">SQL À COPIER ↓</div>
    <pre id="sql-code" style="font-size:10px;color:#a0aec0;white-space:pre-wrap;line-height:1.6;user-select:all">${getSQLCode()}</pre>
    <button class="btn btn-primary full" style="margin-top:10px" onclick="copySql()">📋 Copier le SQL</button>
  </div>
  <div class="setup-box" style="margin-top:4px">
    <h3>🔄 Étape 2 — Recharge la page</h3>
    <p>Une fois le SQL exécuté avec succès dans Supabase, recharge cette page.</p>
  </div>
  <button class="btn btn-primary full" style="background:#34d399" onclick="location.reload()">🔄 Recharger</button>`;
}

function getSQLCode(){
  return `-- Tables famille (v2 avec sondages)
create table if not exists members (
  id bigserial primary key,
  created_at timestamptz default now(),
  prenom text not null,
  surnom text default '',
  emoji text default '🧑',
  color text default '#a78bfa',
  photo_url text,
  favorite_color text default '',
  films text[] default '{}',
  series text[] default '{}',
  chanteurs text[] default '{}',
  acteurs text[] default '{}',
  passions text[] default '{}',
  fun_facts jsonb default '[]'
);

create table if not exists dates (
  id bigserial primary key,
  created_at timestamptz default now(),
  titre text not null,
  date date not null,
  type text default 'autre',
  emoji text default '📌'
);

create table if not exists polls (
  id bigserial primary key,
  created_at timestamptz default now(),
  question text not null,
  type text default 'choix',
  options jsonb default '[]',
  is_open boolean default true
);

create table if not exists poll_answers (
  id bigserial primary key,
  created_at timestamptz default now(),
  poll_id bigint references polls(id) on delete cascade,
  author_name text not null,
  answer text not null
);

-- Activer l'accès public
alter table members enable row level security;
alter table dates enable row level security;
alter table polls enable row level security;
alter table poll_answers enable row level security;

create policy "allow_all" on members for all using (true) with check (true);
create policy "allow_all" on dates for all using (true) with check (true);
create policy "allow_all" on polls for all using (true) with check (true);
create policy "allow_all" on poll_answers for all using (true) with check (true);

-- Colonnes extra membres (si table déjà existante)
alter table members add column if not exists chanteurs text[] default '{}';
alter table members add column if not exists acteurs text[] default '{}';
alter table members add column if not exists passions text[] default '{}';

-- Table scores jeux
create table if not exists scores (
  id bigserial primary key,
  created_at timestamptz default now(),
  player_name text not null,
  score integer not null,
  game text default 'runner'
);
alter table scores enable row level security;
create policy "allow_all" on scores for all using (true) with check (true);`;
}

function copySql(){
  const code=document.getElementById('sql-code');
  if(navigator.clipboard){navigator.clipboard.writeText(code.textContent).then(()=>toast('✅ SQL copié !'));}
  else{const sel=window.getSelection();const range=document.createRange();range.selectNodeContents(code);sel.removeAllRanges();sel.addRange(range);document.execCommand('copy');sel.removeAllRanges();toast('✅ SQL copié !');}
}

// ─── ACCUEIL ───────────────────────────────────────────
function renderAccueil(){
  const today=new Date();
  const upcoming=[...dates].filter(d=>new Date(d.date)>=today).sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(0,3);
  const birthdays=dates.filter(d=>{const bd=new Date(d.date);return d.type==='anniversaire'&&bd.getMonth()===today.getMonth();});
  const dateStr=today.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const openPolls=polls.filter(p=>p.is_open).slice(-3);
  const topMaze=[...scores].filter(s=>s.game==='maze').sort((a,b)=>a.score-b.score).slice(0,5);

  let html=`<div style="text-align:center;padding:10px 0 18px">
    <div style="font-size:52px">🏡</div>

function renderPollDetail(){
  const poll=polls.find(p=>p.id===currentView.id);
  if(!poll){currentView=null;return renderSondages();}
  const answers=poll.answers||[];
  const total=answers.length;

  let html=`<div class="back-bar">
    <button class="btn-ghost btn" onclick="backFromPoll()">← Retour</button>
    <h2>📊 Sondage</h2>
    <button class="btn btn-primary" onclick="togglePollOpen(${poll.id},${poll.is_open})" style="background:${poll.is_open?'#ef4444':'#34d399'};font-size:11px;padding:6px 10px">${poll.is_open?'🔒 Clore':'🔓 Rouvrir'}</button>
  </div>
  <div class="card" style="border-color:rgba(167,139,250,0.3);background:rgba(167,139,250,0.07)">
    <div style="font-size:16px;font-weight:900;margin-bottom:6px">${poll.question}</div>
    <div style="display:flex;gap:8px;align-items:center">
      <span class="chip" style="background:${poll.is_open?'rgba(52,211,153,0.15)':'rgba(239,68,68,0.1)'};border:1px solid ${poll.is_open?'rgba(52,211,153,0.3)':'rgba(239,68,68,0.2)'};color:${poll.is_open?'#34d399':'#ef4444'}">${poll.is_open?'🟢 En cours':'🔴 Terminé'}</span>
      <span style="font-size:12px;color:var(--muted)">${total} réponse${total>1?'s':''}</span>
    </div>
  </div>`;

  // Résultats
  if(poll.type==='choix'){
    const opts=poll.options||[];
    if(opts.length){
      html+=`<div class="card"><div class="card-label" style="color:#a78bfa">📈 Résultats</div>`;
      opts.forEach(opt=>{
        if(!opt)return;
        const count=answers.filter(a=>a.answer===opt).length;
        const pct=total?Math.round(count/total*100):0;
        const voters=answers.filter(a=>a.answer===opt).map(a=>a.author_name).join(', ');
        html+=`<div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span style="font-size:13px;font-weight:700">${opt}</span>
            <span style="font-size:12px;color:#a78bfa;font-weight:800">${count} (${pct}%)</span>
          </div>
          <div style="background:rgba(255,255,255,0.08);border-radius:20px;height:8px;overflow:hidden">
            <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#a78bfa,#f472b6);border-radius:20px;transition:width 0.5s"></div>
          </div>
          ${voters?`<div style="font-size:10px;color:var(--muted);margin-top:3px">👤 ${voters}</div>`:''}
        </div>`;
      });
      html+=`</div>`;
    }
  } else {
    if(answers.length){
      html+=`<div class="card"><div class="card-label" style="color:#34d399">💬 Réponses</div>`;
      answers.forEach(a=>{
        html+=`<div style="background:rgba(255,255,255,0.05);border-radius:12px;padding:10px 12px;margin-bottom:8px">
          <div style="font-size:11px;color:#a78bfa;font-weight:700;margin-bottom:4px">👤 ${a.author_name}</div>
          <div style="font-size:13px">${a.answer}</div>
        </div>`;
      });
      html+=`</div>`;
    } else {
      html+=`<div style="text-align:center;color:var(--muted);padding:20px 0"><div style="font-size:32px;margin-bottom:8px">💬</div>Aucune réponse pour l'instant</div>`;
    }
  }

  // Voter
  if(poll.is_open){
    html+=`<div class="card" style="border-color:rgba(52,211,153,0.3)"><div class="card-label" style="color:#34d399">🗳️ Voter</div>
      <div class="form-group"><label class="lbl">Ton prénom</label>
        <input type="text" id="vote-name" placeholder="Marie..." value="${localStorage.getItem('fam_username')||''}">
      </div>`;
    if(poll.type==='choix'){
      html+=`<div class="form-group"><label class="lbl">Ton choix</label><div id="vote-options" style="display:flex;flex-direction:column;gap:6px">`;
      (poll.options||[]).filter(o=>o).forEach(opt=>{
        html+=`<button class="type-btn btn vote-opt" data-val="${opt}" onclick="selectVoteOption(this,'${opt.replace(/'/g,"\\'")}')">
          <span style="margin-right:6px">⬜</span>${opt}
        </button>`;
      });
      html+=`</div></div>`;
    } else {
      html+=`<div class="form-group"><label class="lbl">Ta réponse</label>
        <input type="text" id="vote-libre" placeholder="Écris ta réponse...">
      </div>`;
    }
    html+=`<input type="hidden" id="vote-selected" value="">
      <button class="btn btn-primary full" style="background:#34d399" onclick="submitVote(${poll.id},'${poll.type}')">🗳️ Envoyer mon vote</button>
    </div>`;
  }
  return html;
}

let selectedVoteOption='';
function selectVoteOption(el,val){
  selectedVoteOption=val;
  document.querySelectorAll('.vote-opt').forEach(b=>{
    b.style.background='rgba(255,255,255,0.06)';b.style.borderColor='rgba(255,255,255,0.1)';
    b.querySelector('span').textContent='⬜';
  });
  el.style.background='rgba(167,139,250,0.2)';el.style.borderColor='#a78bfa';
  el.querySelector('span').textContent='✅';
}

async function submitVote(pollId,type){
  const name=(document.getElementById('vote-name')||{}).value?.trim();
  if(!name){toast('❌ Entre ton prénom');return;}
  localStorage.setItem('fam_username',name);

  // Bloquer vote double : vérifier localStorage
  const voteKey='voted_'+pollId+'_'+name.toLowerCase().trim();
  if(localStorage.getItem(voteKey)){
    toast('⚠️ Tu as déjà voté pour ce sondage !');return;
  }
  // Vérifier aussi en base
  const existing=await db.from('poll_answers').select('id').eq('poll_id',pollId).eq('author_name',name).single();
  if(existing.data){
    localStorage.setItem(voteKey,'1');
    toast('⚠️ Tu as déjà voté pour ce sondage !');return;
  }

  let answer='';
  if(type==='choix'){
    answer=selectedVoteOption;
    if(!answer){toast('❌ Choisis une option');return;}
  } else {
    answer=(document.getElementById('vote-libre')||{}).value?.trim();
    if(!answer){toast('❌ Écris ta réponse');return;}
  }
  const{error}=await db.from('poll_answers').insert({poll_id:pollId,author_name:name,answer});
  if(error){toast('❌ '+error.message);return;}
  localStorage.setItem(voteKey,'1');
  selectedVoteOption='';
  toast('✅ Vote enregistré !');
  // Recharger le sondage pour afficher les résultats
  await reloadPolls();
  render();
}

function setPollType(t){
  editDraft.type=t;
  const ob=document.getElementById('options-block');
  if(ob){if(t==='libre')ob.classList.add('hidden');else ob.classList.remove('hidden');}
  document.getElementById('poll-type-choix').style.cssText=t==='choix'?'background:#a78bfa22;border-color:#a78bfa':'';
  document.getElementById('poll-type-libre').style.cssText=t==='libre'?'background:#34d39922;border-color:#34d399':'';
}
function addPollOption(){
  if(!editDraft.options)editDraft.options=[];
  editDraft.options.push('');refreshPollOptions();
}
function removePollOption(i){
  editDraft.options.splice(i,1);refreshPollOptions();
}
function refreshPollOptions(){
  const ol=document.getElementById('options-list');if(!ol)return;
  let html='';
  (editDraft.options||[]).forEach((opt,i)=>{
    html+=`<div style="display:flex;gap:8px;margin-bottom:8px">
      <input type="text" value="${opt}" placeholder="Option ${i+1}" oninput="editDraft.options[${i}]=this.value" style="flex:1">
      <button class="btn-small btn" style="color:#ef4444;background:rgba(239,68,68,0.15)" onclick="removePollOption(${i})">✕</button>
    </div>`;
  });
  ol.innerHTML=html;
}

function startCreatePoll(){editDraft={question:'',type:'choix',options:['','',''],is_open:true};currentView={type:'create-poll'};render();}
function openPoll(id){currentView={type:'poll',id};render();}
function backFromPoll(){currentView=null;editDraft=null;render();}

async function saveCreatePoll(){
  const q=(document.getElementById('poll-question')||{}).value?.trim()||editDraft.question;
  if(!q){toast('❌ La question est obligatoire');return;}
  const opts=(editDraft.options||[]).filter(o=>o.trim());
  if(editDraft.type==='choix'&&opts.length<2){toast('❌ Ajoute au moins 2 choix');return;}
  const{error}=await db.from('polls').insert({question:q,type:editDraft.type,options:opts,is_open:true});
  if(error){toast('❌ '+error.message);return;}
  toast('✅ Sondage créé !');editDraft=null;currentView=null;
}

async function togglePollOpen(id,isOpen){
  await db.from('polls').update({is_open:!isOpen}).eq('id',id);
  toast(isOpen?'🔒 Sondage clos':'🔓 Sondage rouvert');
}

async function deletePoll(id){
  if(!confirm('Supprimer ce sondage ?'))return;
  await db.from('polls').delete().eq('id',id);
  if(currentView?.id===id)currentView=null;
  toast('🗑️ Sondage supprimé');
}

async function uploadToCloudinary(file,onProgress){
  const fd=new FormData();
  fd.append('file',file);fd.append('upload_preset',CLOUDINARY_PRESET);
  return new Promise((res,rej)=>{
    const xhr=new XMLHttpRequest();
    xhr.open('POST',`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`);
    xhr.upload.onprogress=e=>{if(e.lengthComputable&&onProgress)onProgress(Math.round(e.loaded/e.total*100));};
    xhr.onload=()=>{try{const r=JSON.parse(xhr.responseText);if(r.secure_url)res(r.secure_url);else rej(new Error(r.error?.message||'Upload failed'));}catch{rej(new Error('Parse error'));}};
    xhr.onerror=()=>rej(new Error('Network error'));
    xhr.send(fd);
  });
}

function resizeAndEncodeImage(file, maxSize){
  return new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onerror=()=>rej(new Error('Lecture fichier échouée'));
    reader.onload=e=>{
      const img=new Image();
      img.onerror=()=>rej(new Error('Image invalide'));
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>maxSize||h>maxSize){
          if(w>h){h=Math.round(h*maxSize/w);w=maxSize;}
          else{w=Math.round(w*maxSize/h);h=maxSize;}
        }
        const canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        const ctx=canvas.getContext('2d');
        ctx.drawImage(img,0,0,w,h);
        res(canvas.toDataURL('image/jpeg',0.82));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ─── MAZE GAME ─────────────────────────────────────────
const MROWS = 21, MCOLS = 21;  // Labyrinthe plus grand
const CELL  = 36;               // Taille d'une cellule en px
const VW    = 9;                // Cellules visibles en largeur (viewport)
const VH    = 9;                // Cellules visibles en hauteur
const CVW   = VW * CELL;        // Canvas width  = 324
const CVH   = VH * CELL;        // Canvas height = 324
const TARGET_WORD = ['G','A','I','L','L','A','R','D'];

let MG = {
  running:false, won:false,
  startTime:0, elapsed:0,
  timerInterval:null,
  best: parseFloat(localStorage.getItem('maze_best')||'0'),
  raf:null, keysDown:{}
};

let maze=[], letters=[], collected=[];
let hero = {row:1,col:1,moving:false,dir:'down',animFrame:0,
            fromRow:1,fromCol:1,toRow:1,toCol:1,t:0,x:CELL,y:CELL};

// ── Génération (recursive backtracker) ─────────────────
function generateMaze(){
  maze = Array.from({length:MROWS},()=>Array(MCOLS).fill(1));
  function carve(r,c){
    maze[r][c]=0;
    const dirs=shuffle([[0,2],[0,-2],[2,0],[-2,0]]);
    for(const[dr,dc]of dirs){
      const nr=r+dr,nc=c+dc;
      if(nr>0&&nr<MROWS-1&&nc>0&&nc<MCOLS-1&&maze[nr][nc]===1){
        maze[r+dr/2][c+dc/2]=0; carve(nr,nc);
      }
    }
  }
  carve(1,1);
  for(let r=0;r<MROWS;r++){maze[r][0]=1;maze[r][MCOLS-1]=1;}
  for(let c=0;c<MCOLS;c++){maze[0][c]=1;maze[MROWS-1][c]=1;}
}

function shuffle(a){
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function getFreeCells(){
  const cells=[];
  for(let r=1;r<MROWS-1;r++)
    for(let c=1;c<MCOLS-1;c++)
      if(maze[r][c]===0&&!(r===1&&c===1)) cells.push({r,c});
  return cells;
}

function placeLetters(){
  const free=shuffle(getFreeCells());
  letters=TARGET_WORD.map((ch,i)=>({char:ch,row:free[i].r,col:free[i].c,collected:false,id:i}));
}

function startTimer(){
  MG.startTime=performance.now();
  MG.timerInterval=setInterval(()=>{
    MG.elapsed=(performance.now()-MG.startTime)/1000;
    const td=document.getElementById('timer-display');
    if(td)td.textContent=MG.elapsed.toFixed(1)+'s';
  },100);
}
function stopTimer(){
  clearInterval(MG.timerInterval);
  MG.elapsed=(performance.now()-MG.startTime)/1000;
}
function fmtTime(t){return t?t.toFixed(2)+'s':'—';}

// ── Lifecycle ───────────────────────────────────────────
function stopMaze(){
  if(MG.raf){cancelAnimationFrame(MG.raf);MG.raf=null;}
  clearInterval(MG.timerInterval);
  MG.running=false;
  document.removeEventListener('keydown',onMazeKey);
  document.removeEventListener('keyup',onMazeKeyUp);
}

function startMaze(){
  stopMaze();
  document.getElementById('maze-over-panel')?.classList.add('hidden');
  MG.running=true;MG.won=false;MG.elapsed=0;MG.keysDown={};
  collected=[];
  generateMaze();
  placeLetters();
  hero={row:1,col:1,moving:false,dir:'down',animFrame:0,
        fromRow:1,fromCol:1,toRow:1,toCol:1,t:0,x:CELL,y:CELL};
  document.getElementById('maze-btn').textContent='⏹ Stop';
  updateCollectedUI();
  document.addEventListener('keydown',onMazeKey);
  document.addEventListener('keyup',onMazeKeyUp);
  startTimer();
  lastMazeTs=0;
  MG.raf=requestAnimationFrame(mazeLoop);
}

function toggleMaze(){
  if(MG.running){stopMaze();document.getElementById('maze-btn').textContent='▶ Jouer';}
  else startMaze();
}

// ── Contrôles ───────────────────────────────────────────
function onMazeKey(e){
  const m={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',
           KeyW:'up',KeyS:'down',KeyA:'left',KeyD:'right'};
  if(m[e.code]){e.preventDefault();MG.keysDown[m[e.code]]=true;}
}
function onMazeKeyUp(e){
  const m={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',
           KeyW:'up',KeyS:'down',KeyA:'left',KeyD:'right'};
  if(m[e.code])MG.keysDown[m[e.code]]=false;
}
function pressMazeDir(dir){
  if(!MG.running){startMaze();return;}
  // Appui instantané — déclenche un pas
  MG.keysDown[dir]=true;
  setTimeout(()=>{MG.keysDown[dir]=false;},120);
}

// ── Game loop ───────────────────────────────────────────
let lastMazeTs=0;
function mazeLoop(ts){
  if(!MG.running)return;
  const dt=Math.min((ts-lastMazeTs)/16,3);
  lastMazeTs=ts;
  const canvas=document.getElementById('maze-canvas');
  if(!canvas){stopMaze();return;}
  const ctx=canvas.getContext('2d');

  // Mouvement
  if(!hero.moving){
    let dr=0,dc=0;
    if(MG.keysDown['up'])       {dr=-1;hero.dir='up';}
    else if(MG.keysDown['down']){dr=1; hero.dir='down';}
    else if(MG.keysDown['left']){dc=-1;hero.dir='left';}
    else if(MG.keysDown['right']){dc=1;hero.dir='right';}
    if(dr||dc){
      const nr=hero.row+dr,nc=hero.col+dc;
      if(nr>=0&&nr<MROWS&&nc>=0&&nc<MCOLS&&maze[nr][nc]===0){
        hero.fromRow=hero.row;hero.fromCol=hero.col;
        hero.toRow=nr;hero.toCol=nc;
        hero.moving=true;hero.t=0;
      }
    }
  } else {
    hero.t+=0.2*dt;
    if(hero.t>=1){
      hero.t=1;hero.moving=false;
      hero.row=hero.toRow;hero.col=hero.toCol;
      hero.x=hero.col*CELL;hero.y=hero.row*CELL;
      checkCollect();
    } else {
      hero.x=lerp2(hero.fromCol*CELL,hero.toCol*CELL,ease2(hero.t));
      hero.y=lerp2(hero.fromRow*CELL,hero.toRow*CELL,ease2(hero.t));
    }
    hero.animFrame=(hero.animFrame+0.35*dt)%4;
  }

  drawMaze(ctx);
  MG.raf=requestAnimationFrame(mazeLoop);
}

function lerp2(a,b,t){return a+(b-a)*t;}
function ease2(t){return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}

function checkCollect(){
  for(const l of letters){
    if(!l.collected&&l.row===hero.row&&l.col===hero.col){
      if(l.char===TARGET_WORD[collected.length]){
        l.collected=true;
        collected.push(l.char);
        updateCollectedUI();
        if(collected.length===TARGET_WORD.length)winGame();
      }
    }
  }
}

function updateCollectedUI(){
  const el=document.getElementById('collected-display');
  if(!el)return;
  el.innerHTML=TARGET_WORD.map((ch,i)=>{
    const done=i<collected.length;
    return `<span style="display:inline-flex;align-items:center;justify-content:center;
      width:30px;height:30px;border-radius:8px;font-weight:900;font-size:15px;
      background:${done?'#34d399':'rgba(255,255,255,0.08)'};
      color:${done?'#fff':'rgba(255,255,255,0.25)'};
      border:2px solid ${done?'#34d399':'rgba(255,255,255,0.12)'};
      transition:all 0.2s;${done?'box-shadow:0 0 8px #34d399':''}">${ch}</span>`;
  }).join('');
}

function winGame(){
  stopTimer();
  MG.running=false;
  cancelAnimationFrame(MG.raf);
  document.removeEventListener('keydown',onMazeKey);
  document.removeEventListener('keyup',onMazeKeyUp);
  const t=MG.elapsed;
  if(MG.best===0||t<MG.best){MG.best=t;localStorage.setItem('maze_best',String(t));}
  setTimeout(()=>{
    const p=document.getElementById('maze-over-panel');
    if(p){
      p.classList.remove('hidden');
      document.getElementById('maze-final-time').textContent=fmtTime(t);
      const bd=document.getElementById('maze-best-display');
      if(bd)bd.textContent=fmtTime(MG.best);
      document.getElementById('maze-btn').textContent='▶ Jouer';
    }
  },300);
}

// ── Dessin avec caméra centrée sur le héros ─────────────
function drawMaze(ctx){
  // Position caméra centrée exactement sur le héros
  const heroPixX = hero.x + CELL/2;
  const heroPixY = hero.y + CELL/2;
  let camX = heroPixX - CVW/2;
  let camY = heroPixY - CVH/2;
  // Clamp aux bords
  camX = Math.max(0, Math.min(MCOLS*CELL - CVW, camX));
  camY = Math.max(0, Math.min(MROWS*CELL - CVH, camY));

  ctx.clearRect(0,0,CVW,CVH);

  // Cellules visibles
  const startC = Math.floor(camX/CELL);
  const startR = Math.floor(camY/CELL);
  const endC   = Math.min(MCOLS-1, startC+VW+1);
  const endR   = Math.min(MROWS-1, startR+VH+1);

  for(let r=startR;r<=endR;r++){
    for(let c=startC;c<=endC;c++){
      const sx = c*CELL - camX;
      const sy = r*CELL - camY;
      if(maze[r][c]===1){
        // ── MUR — visible et contrasté ──
        ctx.fillStyle='#312e81';
        ctx.fillRect(sx,sy,CELL,CELL);
        // Face éclairée (haut et gauche)
        ctx.fillStyle='rgba(167,139,250,0.5)';
        ctx.fillRect(sx,sy,CELL,3);
        ctx.fillRect(sx,sy,3,CELL);
        // Face sombre (bas et droite)
        ctx.fillStyle='rgba(0,0,0,0.5)';
        ctx.fillRect(sx,sy+CELL-3,CELL,3);
        ctx.fillRect(sx+CELL-3,sy,3,CELL);
        // Centre du mur — texture
        ctx.fillStyle='#3730a3';
        ctx.fillRect(sx+3,sy+3,CELL-6,CELL-6);
        // Reflet coin
        ctx.fillStyle='rgba(255,255,255,0.07)';
        ctx.beginPath();ctx.arc(sx+CELL/2,sy+CELL/2,CELL/4,0,Math.PI*2);ctx.fill();
      } else {
        // ── SOL ──
        ctx.fillStyle=(r+c)%2===0?'#1a1733':'#1e1b40';
        ctx.fillRect(sx,sy,CELL,CELL);
        // Grille sol légère
        ctx.strokeStyle='rgba(255,255,255,0.04)';
        ctx.lineWidth=0.5;
        ctx.strokeRect(sx,sy,CELL,CELL);
      }
    }
  }

  // Lettres
  for(const l of letters){
    if(l.collected)continue;
    const sx=l.col*CELL-camX;
    const sy=l.row*CELL-camY;
    if(sx<-CELL||sx>CVW||sy<-CELL||sy>CVH)continue;
    // Vérifier si c'est la prochaine à collecter
    const isNext=(l.char===TARGET_WORD[collected.length]);
    const pulse=0.8+Math.sin(performance.now()*0.005+l.id*1.3)*0.2;
    const color=isNext?'#34d399':'#fbbf24';
    ctx.shadowColor=color; ctx.shadowBlur=isNext?16*pulse:10;
    // Halo
    ctx.fillStyle=`rgba(${isNext?'52,211,153':'251,191,36'},${0.2*pulse})`;
    ctx.beginPath();ctx.arc(sx+CELL/2,sy+CELL/2,CELL/2-1,0,Math.PI*2);ctx.fill();
    // Badge
    ctx.fillStyle=color;
    ctx.beginPath();ctx.roundRect(sx+5,sy+5,CELL-10,CELL-10,6);ctx.fill();
    ctx.shadowBlur=0;
    // Lettre
    ctx.fillStyle='#0f0f1a';
    ctx.font=`bold ${CELL*0.5}px Nunito,sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(l.char,sx+CELL/2,sy+CELL/2+1);
    // Numéro ordre
    const idx=TARGET_WORD.slice(collected.length).indexOf(l.char);
    if(idx===0){
      ctx.fillStyle='#fff';
      ctx.font=`bold 8px Nunito,sans-serif`;
      ctx.fillText('NEXT',sx+CELL/2,sy+CELL-5);
    }
  }
  ctx.textBaseline='alphabetic';ctx.textAlign='left';

  // Héros
  const hsx=hero.x-camX;
  const hsy=hero.y-camY;
  drawHero(ctx,hsx,hsy,hero.dir,hero.moving,hero.animFrame);

  // HUD overlay — lettres restantes
  const remaining=TARGET_WORD.slice(collected.length);
  if(remaining.length>0&&collected.length>0){
    const w=remaining.length*18+12;
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.beginPath();ctx.roundRect(4,CVH-22,w,18,6);ctx.fill();
    remaining.forEach((ch,i)=>{
      ctx.fillStyle='#fbbf24';
      ctx.font='bold 11px Nunito,sans-serif';
      ctx.fillText(ch,10+i*18,CVH-8);
    });
  }
}

function drawHero(ctx,px,py,dir,moving,frame){
  const cx=px+CELL/2,cy=py+CELL/2,R=CELL/2-4;
  ctx.save();ctx.translate(cx,cy);
  // Ombre
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath();ctx.ellipse(0,R+2,R*0.6,3,0,0,Math.PI*2);ctx.fill();
  // Corps
  ctx.fillStyle='#a78bfa';
  ctx.shadowColor='#a78bfa';ctx.shadowBlur=12;
  ctx.beginPath();ctx.arc(0,0,R,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  // Reflet
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.beginPath();ctx.arc(-R*0.3,-R*0.35,R*0.35,0,Math.PI*2);ctx.fill();
  // Yeux
  const offs={up:[0,-R*0.3],down:[0,R*0.2],left:[-R*0.25,0],right:[R*0.25,0]};
  const [ex,ey]=offs[dir]||[0,0];
  const px2=(dir==='up'||dir==='down')?R*0.28:0;
  const py2=(dir==='left'||dir==='right')?R*0.28:0;
  [[ex-px2,ey-py2],[ex+px2,ey+py2]].forEach(([x,y])=>{
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x,y,3.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#111';ctx.beginPath();ctx.arc(x+0.5,y+0.5,2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.8)';ctx.beginPath();ctx.arc(x-0.5,y-1,0.8,0,Math.PI*2);ctx.fill();
  });
  // Jambes
  if(moving){
    const sw=Math.sin(frame*Math.PI)*5;
    ctx.strokeStyle='#7c3aed';ctx.lineWidth=3;ctx.lineCap='round';
    ctx.beginPath();
    if(dir==='up'||dir==='down'){
      ctx.moveTo(-4,R-2);ctx.lineTo(-4+sw,R+6);
      ctx.moveTo(4,R-2);ctx.lineTo(4-sw,R+6);
    } else {
      const sx2=dir==='right'?R-2:-R+2,ex2=dir==='right'?R+6:-R-6;
      ctx.moveTo(sx2,-4);ctx.lineTo(ex2,-4+sw);
      ctx.moveTo(sx2,4);ctx.lineTo(ex2,4-sw);
    }
    ctx.stroke();
  }
  ctx.restore();
}

// ── initGame & renderJeux ───────────────────────────────
function initGame(){
  const canvas=document.getElementById('maze-canvas');
  if(!canvas)return;
  canvas.width=CVW; canvas.height=CVH;
  canvas.style.width='100%'; canvas.style.height='auto';
  const ctx=canvas.getContext('2d');
  // Écran titre
  ctx.fillStyle='#0f0f1a';ctx.fillRect(0,0,CVW,CVH);
  // Déco murs
  for(let r=0;r<VH;r++) for(let c=0;c<VW;c++){
    if((r+c)%3===0){
      ctx.fillStyle='#312e81';ctx.fillRect(c*CELL,r*CELL,CELL,CELL);
      ctx.fillStyle='#3730a3';ctx.fillRect(c*CELL+3,r*CELL+3,CELL-6,CELL-6);
    } else {
      ctx.fillStyle='#1a1733';ctx.fillRect(c*CELL,r*CELL,CELL,CELL);
    }
  }
  ctx.fillStyle='rgba(0,0,0,0.65)';
  ctx.beginPath();ctx.roundRect(CVW/2-115,CVH/2-55,230,115,18);ctx.fill();
  ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font='bold 17px Nunito,sans-serif';
  ctx.fillText('🏃 Labyrinthe GAILLARD',CVW/2,CVH/2-28);
  ctx.font='12px Nunito,sans-serif';ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.fillText('Collecte G·A·I·L·L·A·R·D dans l\'ordre',CVW/2,CVH/2+2);
  ctx.fillText('le plus vite possible !',CVW/2,CVH/2+22);
  ctx.textAlign='left';ctx.textBaseline='alphabetic';
  updateCollectedUI();
}

function refreshLeaderboard(){
  const lb=document.getElementById('leaderboard');if(!lb)return;
  const medals=['🥇','🥈','🥉'];
  const sorted=[...scores].filter(s=>s.game==='maze').sort((a,b)=>a.score-b.score);
  let html='';
  if(!sorted.length){
    html=`<div style="text-align:center;color:var(--muted);padding:24px 0"><div style="font-size:40px">⏱</div>Soyez le premier à finir !</div>`;
  } else {
    sorted.forEach((s,i)=>{
      const cls=i===0?'gold':i===1?'silver':i===2?'bronze':'';
      html+=`<div class="leaderboard-row ${cls}">
        <span class="podium-medal">${medals[i]||('#'+(i+1))}</span>
        <span class="lb-name">${s.player_name}</span>
        <span class="lb-score">${fmtTime(s.score)}</span>
        <span style="font-size:10px;color:var(--muted)">${new Date(s.created_at).toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</span>
      </div>`;
    });
  }
  lb.innerHTML=html;
}

  document.getElementById('tab-info').classList.add('active');

  render();
}

  currentTab='sondages';currentView={type:'poll',id};
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-sondages').classList.add('active');
  document.getElementById('header-sub').textContent='Sondages';
  render();
}

async function saveMazeScore(){
  const name=(document.getElementById('player-name-input')||{}).value?.trim();
  if(!name){toast('❌ Entre ton prénom !');return;}
  localStorage.setItem('fam_username',name);
  const t=parseFloat(MG.elapsed.toFixed(2));
  // score est stocké en float dans Supabase
  const{error}=await db.from('scores').insert({player_name:name,score:t,game:'maze'});
  if(error){
    toast('❌ '+error.message);
    console.error('Score error:',error);
    return;
  }
  toast('🏆 Temps enregistré !');
  document.getElementById('maze-over-panel').classList.add('hidden');
  const bd=document.getElementById('maze-best-display');
  if(bd) bd.textContent=fmtTime(MG.best);
}

// Alias pour compatibilité realtime
async function saveScore(){ await saveMazeScore(); }

// ─── BOOT ──────────────────────────────────────────────
async function boot(){
  const ok=await loadAll();
  dbReady=ok;
  if(ok)setupRealtime();
  document.getElementById('loading').style.display='none';
  render();
}
boot();
</script>
